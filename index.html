document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"es\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Cala Tangó — Kayak Quest<\u002Ftitle>\n\n<style>/* ═══════════════════════════════════════════════════════════════\n   Cala Tangó — Kayak Quest · Design System\n   Global entry point. Consumers link THIS file only.\n   Keep this as @import lines only.\n═══════════════════════════════════════════════════════════════ */\n/* ── Cala Tangó · Typography ───────────────────────────────────\n   Retro / GBA-era pixel typography.\n   \"Press Start 2P\"  → titles, UI labels, HUD (blocky, all-caps feel)\n   \"VT323\"           → dialogue body & long copy (tall, readable pixel)\n   Loaded from Google Fonts CDN — see CAVEATS in readme to ship binaries.\n─────────────────────────────────────────────────────────────── */\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Press Start 2P';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"e30d1566-2624-45ec-99fa-6b345b756c96\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Press Start 2P';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"5830aa1e-dd91-4900-9e52-1bf874763569\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'Press Start 2P';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"9e2d72ab-93ed-49cf-8f51-5b295222f833\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Press Start 2P';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"cdfb3b52-d502-4d43-9f19-6c2c877282fd\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Press Start 2P';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"a843602c-a1bd-4a5e-80a9-7c716f10eec1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"7a201bbb-3f25-4628-8014-28412cf1eecd\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f9cc3bb4-53b4-4ae3-b510-74a8326c5867\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"ac5b19ad-b969-4083-92f1-c7d4bc2e9675\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* Families */\n  --font-display: 'Press Start 2P', 'Courier New', monospace;\n  --font-body: 'VT323', 'Courier New', monospace;\n\n  /* Sizes — display (Press Start 2P is huge per-px, keep small) */\n  --type-hud: 8px;\n  --type-label: 10px;\n  --type-title: 16px;\n  --type-hero: 28px;\n\n  /* Sizes — body / dialogue (VT323 reads small, size up generously) */\n  --type-dialogue: 26px;\n  --type-body: 20px;\n  --type-caption: 18px;\n\n  /* Line heights */\n  --leading-display: 1.5;\n  --leading-body: 1.05;\n\n  /* Pixel-perfect rendering */\n  --letterspace-display: 0.5px;\n}\n\n/* ── Cala Tangó · Color tokens ─────────────────────────────────\n   A sun-bleached Mediterranean GBA palette. Warm sand, three\n   depths of sea, foam highlights, and the two drivers' colors.\n─────────────────────────────────────────────────────────────── */\n:root {\n  /* ── Sea (three depths + foam) ── */\n  --sea-deep:     #1b5e8c;\n  --sea-mid:      #2e86c0;\n  --sea-shallow:  #5cc1e8;\n  --sea-foam:     #d9f4ff;\n\n  /* ── Land ── */\n  --sand:         #ecd9a6;\n  --sand-wet:     #d6b97a;\n  --sand-dark:    #b8954f;\n  --rock:         #7c7a8a;\n  --rock-dark:    #545264;\n  --palm:         #4ea24a;\n  --palm-dark:    #2f7438;\n\n  /* ── Sky / sun ── */\n  --sky:          #aee3f5;\n  --sun:          #ffe08a;\n\n  /* ── Drivers ── */\n  --tony:         #2f6cdf;   /* steady blue — precise captain */\n  --tony-skin:    #e7b27a;\n  --tony-hair:    #3a2a1c;\n  --cynthia:      #e0517a;   /* chaos pink */\n  --cynthia-skin: #f2cba0;\n  --cynthia-hair: #f2cf63;\n\n  /* ── Objects ── */\n  --kayak:        #f2c14e;   /* yellow hull */\n  --kayak-trim:   #e07a3a;\n  --paddle:       #b06a35;\n  --beer:         #e8c14a;\n  --buoy:         #e2402f;\n\n  /* ── UI: Pokémon-style dialogue box ── */\n  --box-fill:     #f8f8f8;\n  --box-ink:      #303030;\n  --box-border-1: #203aa0;   /* outer navy */\n  --box-border-2: #6f8ee0;   /* inner light */\n  --box-shadow:   #0a1644;\n\n  /* ── UI accents ── */\n  --accent:       #d83838;   /* alert red */\n  --accent-yellow:#f8b800;\n  --ok:           #3fae5a;\n  --night:        #1a1730;   /* letterbox / backdrop */\n\n  /* ── Semantic aliases ── */\n  --text-strong:  var(--box-ink);\n  --surface-box:  var(--box-fill);\n  --hud-bg:       rgba(26, 23, 48, 0.82);\n}\n\n/* ── Cala Tangó · Spacing & pixel system ───────────────────────\n   Everything snaps to an 8px (1 \"tile-half\") grid. Borders are\n   chunky and hard — no soft shadows, no anti-aliased radii.\n─────────────────────────────────────────────────────────────── */\n:root {\n  --px: 1px;\n  --u: 8px;            /* base unit  */\n  --u2: 16px;          /* one tile   */\n  --u3: 24px;\n  --u4: 32px;          /* two tiles  */\n  --u6: 48px;\n  --u8: 64px;\n\n  /* Chunky pixel borders */\n  --border-w: 4px;\n  --border-w-thin: 2px;\n\n  /* Radii — square by default, tiny chamfer max */\n  --radius-0: 0px;\n  --radius-chip: 4px;\n\n  /* Hard drop shadow (offset, no blur) */\n  --shadow-hard: 4px 4px 0 var(--box-shadow);\n  --shadow-hud:  0 2px 0 rgba(0,0,0,0.4);\n}\n\n<\u002Fstyle>\n<style>\n  *{ box-sizing:border-box; margin:0; padding:0; }\n  html,body{ height:100%; }\n  body{\n    background:\n      radial-gradient(120% 120% at 50% -10%, #2e86c0 0%, #1b5e8c 55%, #15446a 100%);\n    font-family:var(--font-body);\n    color:#fff; display:grid; place-items:center; overflow:hidden;\n    image-rendering:pixelated;\n  }\n  /* fixed-size stage, scaled to fit viewport, letterboxed */\n  #stage{\n    position:relative; width:256px; height:192px;\n    transform-origin:center;\n    border:var(--border-w) solid #0a1644;\n    box-shadow:0 0 0 4px #2a3a7a, 0 18px 40px rgba(0,0,0,.5);\n    background:#15446a; overflow:hidden; cursor:pointer;\n    user-select:none; touch-action:none;\n  }\n  #game{\n    position:absolute; inset:0; width:100%; height:100%;\n    image-rendering:pixelated;\n  }\n  #ui{ position:absolute; inset:0; pointer-events:none; }\n\n  /* ── Mission banner ── */\n  #banner{\n    position:absolute; top:0; left:0; right:0;\n    display:none; text-align:center;\n    font-family:var(--font-display); font-size:7px; letter-spacing:.3px;\n    color:#fff; padding:5px 6px;\n    background:linear-gradient(#1a1730ee,#1a173000);\n    text-shadow:1px 1px 0 #000;\n  }\n\n  /* ── Pokémon dialogue box ── */\n  #dialogue{\n    position:absolute; left:6px; right:6px; bottom:6px;\n    opacity:0; transform:translateY(6px); transition:opacity .12s, transform .12s;\n  }\n  #dialogue.show{ opacity:1; transform:none; }\n  .dbox{\n    position:relative;\n    background:var(--box-fill);\n    border:3px solid var(--box-border-1);\n    box-shadow:inset 0 0 0 2px var(--box-border-2), 3px 3px 0 #0a1644;\n    padding:9px 10px 10px;\n    min-height:60px;\n  }\n  .dspeaker{\n    position:absolute; top:-11px; left:6px;\n    font-family:var(--font-display); font-size:7px; color:#fff;\n    background:var(--box-border-1); padding:3px 5px;\n    box-shadow:2px 2px 0 #0a1644;\n  }\n  .dtext{\n    font-family:var(--font-body); font-size:15px; line-height:1.12;\n    color:var(--box-ink); margin-top:2px; text-wrap:pretty;\n  }\n  .dmore{\n    position:absolute; right:7px; bottom:4px; color:var(--accent);\n    font-size:13px; visibility:hidden;\n  }\n\n  /* ── Character select ── */\n  #select{\n    position:absolute; inset:0; display:none; pointer-events:auto;\n    flex-direction:column; align-items:center; justify-content:center;\n    background:linear-gradient(#15446aee,#0a1f33f2);\n    padding:6px;\n  }\n  #select.show{ display:flex; }\n  #select h1{\n    font-family:var(--font-display); font-size:7px; color:var(--sun);\n    text-shadow:1px 1px 0 #000; text-align:center; line-height:1.5;\n  }\n  #select .sub{ font-family:var(--font-body); font-size:12px; color:#cfeaff; margin:2px 0 6px; white-space:nowrap; }\n  .cards{ display:flex; gap:6px; }\n  .pc{\n    width:90px; background:#f8f8f8; border:2px solid #203aa0;\n    box-shadow:inset 0 0 0 2px #6f8ee0, 2px 2px 0 #0a1644;\n    padding:5px; text-align:center; cursor:pointer;\n    transition:transform .08s;\n  }\n  .pc:hover{ transform:translateY(-2px); }\n  .pc canvas{ width:36px; height:40px; image-rendering:pixelated; }\n  .pc .nm{ font-family:var(--font-display); font-size:7px; color:#203aa0; margin:3px 0 4px; }\n  .flag{ width:38px; height:25px; margin:2px auto 0; border:2px solid #0a1644;\n    display:flex; flex-direction:column; position:relative; overflow:hidden; }\n  .flag i{ display:block; flex:1; }\n  .flag.es i:nth-child(2){ flex:2; }\n  .flag.ar .sun{ position:absolute; left:50%; top:50%; width:9px; height:9px; transform:translate(-50%,-50%);\n    background:#f6b40e; border-radius:50%; box-shadow:0 0 0 1px #d98e00; z-index:1; }\n  .pc .go{\n    margin-top:4px; font-family:var(--font-display); font-size:6px; color:#fff;\n    background:var(--accent); padding:4px; box-shadow:2px 2px 0 #6b1414;\n  }\n  .pc.tony .go{ background:#2f6cdf; box-shadow:2px 2px 0 #16336e; }\n\n  /* ── End screen ── */\n  #endscreen{\n    position:absolute; inset:0; display:none; pointer-events:auto;\n    flex-direction:column; align-items:center; justify-content:center;\n    background:linear-gradient(#15446aee,#0a1f33f2); text-align:center; padding:10px;\n  }\n  #endscreen.show{ display:flex; }\n  #endscreen h1{ font-family:var(--font-display); font-size:13px; color:var(--sun); text-shadow:2px 2px 0 #000; }\n  #endscreen p{ font-family:var(--font-body); font-size:16px; color:#cfeaff; margin:8px 0 12px; max-width:220px; line-height:1.05; }\n  #end-again{\n    font-family:var(--font-display); font-size:8px; color:#fff; cursor:pointer;\n    background:var(--accent); padding:7px 10px; box-shadow:3px 3px 0 #6b1414;\n  }\n\n  /* ── Controls hint (below stage) ── */\n  #hint{\n    position:fixed; bottom:10px; left:0; right:0; text-align:center;\n    font-family:var(--font-display); font-size:7px; color:#bcd6ea; opacity:.8;\n    text-shadow:1px 1px 0 #000;\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div id=\"stage\">\n    <canvas id=\"game\" width=\"256\" height=\"192\"><\u002Fcanvas>\n    <div id=\"ui\">\n      <div id=\"banner\"><\u002Fdiv>\n\n      <div id=\"select\">\n        <h1>CALA TANGÓ<br>KAYAK QUEST<\u002Fh1>\n        <div class=\"sub\">¿Quién pilota?<\u002Fdiv>\n        <div class=\"cards\">\n          <div class=\"pc tony\" id=\"pick-tony\">\n            <canvas id=\"pic-tony\" width=\"36\" height=\"40\"><\u002Fcanvas>\n            <div class=\"nm\">TONI<\u002Fdiv>\n            <div class=\"flag es\"><i style=\"background:#c60b1e\"><\u002Fi><i style=\"background:#f7c600\"><\u002Fi><i style=\"background:#c60b1e\"><\u002Fi><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"pc\" id=\"pick-cynthia\">\n            <canvas id=\"pic-cynthia\" width=\"36\" height=\"40\"><\u002Fcanvas>\n            <div class=\"nm\">CYNTHIA<\u002Fdiv>\n            <div class=\"flag ar\"><i style=\"background:#7cb6e0\"><\u002Fi><i style=\"background:#ffffff\"><\u002Fi><i style=\"background:#7cb6e0\"><\u002Fi><span class=\"sun\"><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div id=\"dialogue\">\n        <div class=\"dbox\">\n          <span class=\"dspeaker\"><\u002Fspan>\n          <p class=\"dtext\"><\u002Fp>\n          <span class=\"dmore\">▼<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div id=\"endscreen\">\n        <h1>¡EN TIERRA!<\u002Fh1>\n        <p>Has vuelto con vida a la playa de origen al mando de <b id=\"end-driver\">TONY<\u002Fb>. Sin cala, sin cerveza, sin paciencia. Una jornada de mar redonda.<\u002Fp>\n        <div id=\"end-again\">JUGAR OTRA VEZ ▶<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"hint\">FLECHAS / WASD MOVER · ESPACIO HABLAR · CLIC PARA EMPEZAR<\u002Fdiv>\n\n  <script src=\"e94a74c9-8a8c-4549-833c-87e819e75602\"><\u002Fscript>\n  <script src=\"18b381e0-6544-4a4b-ac56-9a57e7675579\"><\u002Fscript>\n  <script>\n    // Scale the fixed 256×192 stage to fit the viewport (integer-ish), letterboxed.\n    (function(){\n      const stage=document.getElementById('stage');\n      function fit(){\n        const m=24;\n        const sx=(innerWidth-m)/256, sy=(innerHeight-60)/192;\n        const s=Math.max(1, Math.min(sx,sy));\n        stage.style.transform='scale('+s+')';\n      }\n      addEventListener('resize',fit); fit();\n    })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
